<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay focused</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#090d16">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3233/3233068.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@700&family=Tajawal:wght@500;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #090d16;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
        }

        .game-container {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            width: 380px;
        }

        .epic-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(45deg, #ffd700, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 10px;
        }

        .player {
            flex: 1;
            padding: 10px;
            border-radius: 15px;
            transition: all 0.3s ease;
            opacity: 0.5;
        }

        .player.active {
            opacity: 1;
            background: rgba(56, 189, 248, 0.2);
            border: 1px solid rgba(56, 189, 248, 0.5);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .player-name {
            font-size: 1rem;
            font-weight: 700;
            color: #cbd5e1;
            margin-bottom: 5px;
        }

        .player-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .game-info { margin-bottom: 15px; }
        .target-box { font-size: 1.1rem; color: #94a3b8; }
        #target-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #ff007f;
            font-weight: 700;
            margin: 0 5px;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
            letter-spacing: 2px;
        }

        .status-msg {
            font-size: 0.9rem;
            color: #38bdf8;
            margin-top: 10px;
            height: 20px;
            font-weight: 600;
        }

        .display {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            direction: ltr; 
        }

        .unit { display: flex; flex-direction: column; align-items: center; }
        .unit-label { font-family: 'Poppins', sans-serif; font-size: 0.65rem; color: #64748b; text-transform: uppercase; margin-top: 5px; }

        #seconds { color: #38bdf8; }
        #moments { color: #ff007f; }
        .separator { color: #cbd5e1; padding-bottom: 15px; }

        .controls { display: flex; gap: 10px; margin-top: 20px; }
        button {
            padding: 15px;
            flex: 1;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        button:active { transform: scale(0.95); }
        
        #startBtn { background: linear-gradient(135deg, #38bdf8, #0284c7); color: #090d16; box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }
        #pauseBtn { background: linear-gradient(135deg, #f43f5e, #be123c); color: white; display: none; box-shadow: 0 5px 15px rgba(244, 63, 94, 0.4); }
        #nextBtn { background: #334155; color: white; display: none; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1 class="epic-title">Stay focused</h1>
        
        <div class="scoreboard">
            <div class="player active" id="player-amin">
                <div class="player-name">أمين</div>
                <div class="player-score" id="score-amin">0</div>
            </div>
            <div class="player" id="player-saraba">
                <div class="player-name">صرابا</div>
                <div class="player-score" id="score-saraba">0</div>
            </div>
        </div>

        <div class="game-info">
            <div class="target-box">الهدف: وقّف عند <br> <span id="target-number">00:00</span></div>
            <div class="status-msg" id="status-msg">دور أمين، اضغط ابدأ!</div>
        </div>
        
        <div class="display">
            <div class="unit">
                <span id="seconds">00</span>
                <span class="unit-label">Secs</span>
            </div>
            <span class="separator">:</span>
            <div class="unit">
                <span id="moments">00</span>
                <span class="unit-label">Mmnts</span>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" onclick="handleStart()">ابدأ</button>
            <button id="pauseBtn" onclick="handlePause()">وقّف</button>
            <button id="nextBtn" onclick="nextRound()">جولة جديدة</button>
        </div>
    </div>

    <script>
        let startTime = 0, elapsedTime = 0, timerInterval;
        const sDisplay = document.getElementById("seconds"), mDisplay = document.getElementById("moments");
        const startBtn = document.getElementById("startBtn"), pauseBtn = document.getElementById("pauseBtn"), nextBtn = document.getElementById("nextBtn");
        const statusMsg = document.getElementById("status-msg"), targetDisplay = document.getElementById("target-number");
        
        const playerAmin = document.getElementById("player-amin");
        const playerSaraba = document.getElementById("player-saraba");
        const scoreAminDisplay = document.getElementById("score-amin");
        const scoreSarabaDisplay = document.getElementById("score-saraba");

        let audioCtx;
        let targetTotalMoments = 0; 
        let turn = 'amin'; 
        let aminDiff = 0, sarabaDiff = 0, scoreAmin = 0, scoreSaraba = 0;

        function playSound(freq1, freq2, type = 'sine') {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq1, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq2, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function generateTarget() {
            const targetSeconds = Math.floor(Math.random() * 8) + 3; 
            const targetMoments = Math.floor(Math.random() * 100); 
            targetTotalMoments = (targetSeconds * 100) + targetMoments; 
            targetDisplay.textContent = targetSeconds.toString().padStart(2, '0') + ":" + targetMoments.toString().padStart(2, '0');
        }
        generateTarget();

        function handleStart() {
            playSound(1200, 300);
            startTimer();
            statusMsg.textContent = "ركّز ووقّف في اللحظة المناسبة!";
        }

        function handlePause() {
            playSound(1200, 300);
            stopTimer();
            
            const timePassed = Date.now() - startTime;
            const stoppedTotalMoments = Math.floor(timePassed / 10);
            const diff = Math.abs(stoppedTotalMoments - targetTotalMoments);

            if (turn === 'amin') {
                aminDiff = diff;
                statusMsg.textContent = `أمين وقّف بفرق ${diff} لحظة! دور صرابا..`;
                turn = 'saraba';
                
                playerAmin.classList.remove('active');
                playerSaraba.classList.add('active');
                
                startBtn.textContent = "ابدأ (صرابا)";
                startBtn.style.display = "block";
                pauseBtn.style.display = "none";
                
                sDisplay.textContent = "00";
                mDisplay.textContent = "00";
                elapsedTime = 0;

            } else if (turn === 'saraba') {
                sarabaDiff = diff;
                let resultText = "";
                
                if (aminDiff < sarabaDiff) {
                    resultText = `فوز أمين! (فرق أمين: ${aminDiff}، صرابا: ${sarabaDiff})`;
                    scoreAmin++; scoreAminDisplay.textContent = scoreAmin;
                    playSound(800, 1500, 'triangle');
                } else if (sarabaDiff < aminDiff) {
                    resultText = `فوز صرابا! (فرق أمين: ${aminDiff}، صرابا: ${sarabaDiff})`;
                    scoreSaraba++; scoreSarabaDisplay.textContent = scoreSaraba;
                    playSound(800, 1500, 'triangle'); 
                } else {
                    resultText = `تعادل! كلاكما بفرق ${aminDiff} لحظة`;
                }

                statusMsg.textContent = resultText;
                
                startBtn.style.display = "none";
                pauseBtn.style.display = "none";
                nextBtn.style.display = "block";
            }
        }

        function nextRound() {
            playSound(600, 100, 'triangle'); 
            generateTarget();
            turn = 'amin';
            
            playerSaraba.classList.remove('active');
            playerAmin.classList.add('active');
            statusMsg.textContent = "دور أمين، اضغط ابدأ!";
            
            sDisplay.textContent = "00"; mDisplay.textContent = "00"; elapsedTime = 0;
            
            nextBtn.style.display = "none";
            startBtn.textContent = "ابدأ (أمين)";
            startBtn.style.display = "block";
        }

        function startTimer() {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(updateTime, 10);
            startBtn.style.display = "none"; pauseBtn.style.display = "block";
        }

        function stopTimer() {
            clearInterval(timerInterval);
            elapsedTime = Date.now() - startTime;
        }

        function updateTime() {
            const timePassed = Date.now() - startTime;
            sDisplay.textContent = Math.floor(timePassed / 1000).toString().padStart(2, '0');
            mDisplay.textContent = Math.floor((timePassed % 1000) / 10).toString().padStart(2, '0');
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then((reg) => console.log('Service worker registered.', reg))
                .catch((err) => console.log('Service worker not registered.', err));
            });
        }
    </script>
</body>
</html>
