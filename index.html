<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay Focused</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#080b14">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3240/3240638.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&family=Orbitron:wght@500;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080b14;
            --panel: rgba(16, 22, 36, 0.65);
            --line: rgba(255,255,255,0.06);
            --cyan: #43d9ff;
            --amber: #ffb020;
            --magenta: #ff3d81;
            --ink: #eef2fb;
            --muted: #7c88a6;
        }

        body {
            background: radial-gradient(circle at 20% 15%, #101b30 0%, transparent 45%),
                        radial-gradient(circle at 85% 90%, #1a0f26 0%, transparent 45%),
                        var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 42px 42px;
            pointer-events: none;
            mask-image: radial-gradient(circle at 50% 40%, black, transparent 75%);
        }

        .game-container {
            background: var(--panel);
            backdrop-filter: blur(22px);
            border: 1px solid var(--line);
            border-top: 2px solid rgba(67,217,255,0.35);
            padding: 30px 32px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
            width: 380px;
            max-height: 88vh;
            overflow-y: auto;
            z-index: 10;
        }
        .game-container::-webkit-scrollbar { width: 4px; }
        .game-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .eyebrow {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .epic-title {
            font-family: 'Sora', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--ink);
            margin-bottom: 4px;
        }
        .epic-title .dot { color: var(--cyan); text-shadow: 0 0 14px rgba(67,217,255,0.7); }

        .screen { display: none; flex-direction: column; width: 100%; }
        .screen.active { display: flex; animation: fadeIn 0.45s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ---------- Menu ---------- */
        .menu-sub { color: var(--muted); margin: 14px 0 22px; font-size: 0.95rem; }

        .mode-card {
            display: flex; align-items: center; gap: 14px; text-align: left;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--line);
            padding: 16px 18px; margin: 10px 0; border-radius: 18px;
            cursor: pointer; transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }
        .mode-card:hover { transform: translateY(-2px); border-color: rgba(67,217,255,0.35); background: rgba(67,217,255,0.06); }
        .mode-card .icon {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
            background: linear-gradient(135deg, rgba(67,217,255,0.18), rgba(67,217,255,0.04));
            border: 1px solid rgba(67,217,255,0.25);
        }
        .mode-card.alt .icon { background: linear-gradient(135deg, rgba(255,61,129,0.18), rgba(255,61,129,0.04)); border-color: rgba(255,61,129,0.3); }
        .mode-card h3 { font-family: 'Sora', sans-serif; font-size: 1.02rem; font-weight: 700; margin-bottom: 2px; }
        .mode-card p { font-size: 0.78rem; color: var(--muted); line-height: 1.3; }

        .history-link { margin-top: 8px; background: transparent; border: none; color: var(--muted); font-family: 'Inter'; font-size: 0.8rem; cursor: pointer; text-decoration: underline; }
        .history-link:hover { color: var(--ink); }

        /* ---------- Setup screens ---------- */
        .setup-label { font-family: 'Sora', sans-serif; font-size: 1.05rem; font-weight: 700; margin: 6px 0 14px; }

        .count-picker { margin: 6px auto 6px; }
        .count-display {
            font-family: 'Orbitron', sans-serif; font-size: 3.2rem; font-weight: 700; color: var(--amber);
            text-shadow: 0 0 22px rgba(255,176,32,0.45); line-height: 1; margin-bottom: 4px;
        }
        .count-display-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 18px; }
        .slider-row { display: flex; align-items: center; gap: 12px; }
        .step-btn {
            width: 46px; height: 46px; flex-shrink: 0; border-radius: 14px; border: 1px solid var(--line);
            background: rgba(255,255,255,0.04); color: var(--ink); font-family: 'Sora'; font-size: 1.4rem; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none;
        }
        .step-btn:active { transform: scale(0.92); background: rgba(67,217,255,0.12); }
        .count-slider {
            flex: 1; -webkit-appearance: none; appearance: none; height: 8px; border-radius: 6px;
            background: linear-gradient(90deg, var(--cyan) 0%, var(--cyan) var(--fill, 0%), rgba(255,255,255,0.08) var(--fill, 0%), rgba(255,255,255,0.08) 100%);
            outline: none; cursor: pointer;
        }
        .count-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%;
            background: var(--amber); border: 3px solid #1c1000; box-shadow: 0 0 12px rgba(255,176,32,0.6); cursor: pointer;
        }
        .count-slider::-moz-range-thumb {
            width: 26px; height: 26px; border-radius: 50%; border: 3px solid #1c1000;
            background: var(--amber); box-shadow: 0 0 12px rgba(255,176,32,0.6); cursor: pointer;
        }
        .count-hint { font-size: 0.78rem; color: var(--muted); margin-top: 14px; margin-bottom: 20px; }

        .segmented { display: flex; gap: 8px; margin-bottom: 22px; }
        .seg-btn { flex: 1; padding: 11px; border-radius: 12px; border: 1px solid var(--line); background: rgba(255,255,255,0.03); color: var(--muted); font-family: 'Sora'; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.15s ease; }
        .seg-btn.active { background: rgba(67,217,255,0.12); border-color: rgba(67,217,255,0.4); color: var(--cyan); }

        .name-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; text-align: left; max-height: 38vh; overflow-y: auto; padding-right: 4px; }
        .name-row { display: flex; align-items: center; gap: 10px; }
        .name-row .seed { width: 26px; height: 26px; flex-shrink: 0; border-radius: 8px; background: rgba(67,217,255,0.12); border: 1px solid rgba(67,217,255,0.3); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 0.72rem; color: var(--cyan); }
        .name-row input { flex: 1; padding: 11px 14px; border-radius: 12px; border: 1px solid var(--line); background: rgba(255,255,255,0.03); color: var(--ink); font-family: 'Inter'; font-size: 0.92rem; outline: none; }
        .name-row input:focus { border-color: var(--cyan); }

        .primary-btn {
            background: linear-gradient(135deg, var(--cyan), #0284c7); color: #06121c;
            padding: 14px; border: none; border-radius: 16px; font-family: 'Sora'; font-weight: 700;
            font-size: 0.98rem; cursor: pointer; box-shadow: 0 6px 16px rgba(67,217,255,0.3); width: 100%;
        }
        .primary-btn:active { transform: scale(0.98); }

        /* ---------- Round label ---------- */
        .round-label {
            display: inline-block; font-family: 'Sora', sans-serif; font-size: 0.7rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase; color: var(--amber);
            background: rgba(255,176,32,0.1); border: 1px solid rgba(255,176,32,0.3);
            padding: 5px 12px; border-radius: 20px; margin-bottom: 12px; align-self: center;
        }

        /* ---------- Scoreboard ---------- */
        .scoreboard { display: flex; gap: 10px; margin-bottom: 14px; }
        .player { flex: 1; padding: 10px 8px; border-radius: 16px; opacity: 0.45; border: 1px solid var(--line); transition: all 0.3s ease; background: rgba(255,255,255,0.02); }
        .player.active { opacity: 1; background: rgba(67,217,255,0.08); border-color: rgba(67,217,255,0.4); box-shadow: 0 0 18px rgba(67,217,255,0.15); }
        .player.active.alt { background: rgba(255,61,129,0.08); border-color: rgba(255,61,129,0.4); box-shadow: 0 0 18px rgba(255,61,129,0.15); }
        .player-name { font-family: 'Sora', sans-serif; font-size: 0.82rem; font-weight: 600; color: #cbd5e1; margin-bottom: 4px; letter-spacing: 0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-score { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--amber); text-shadow: 0 0 12px rgba(255,176,32,0.4); }

        .target-box { font-size: 0.95rem; color: var(--muted); }
        .target-number { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; color: var(--magenta); font-weight: 700; margin: 0 5px; text-shadow: 0 0 10px rgba(255,61,129,0.4); }
        .status-msg { font-size: 0.88rem; color: var(--cyan); margin-top: 8px; min-height: 38px; font-weight: 500; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.35; }
        .status-msg.match-point { color: var(--amber); font-weight: 700; }

        /* ---------- Bezel / dial display ---------- */
        .dial-wrap { position: relative; width: 220px; height: 220px; margin: 16px auto 10px; }
        .dial-ring {
            position: absolute; inset: 0; border-radius: 50%;
            background: repeating-conic-gradient(rgba(255,255,255,0.09) 0deg 2deg, transparent 2deg 30deg);
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 14px), #000 calc(100% - 13px));
                    mask: radial-gradient(farthest-side, transparent calc(100% - 14px), #000 calc(100% - 13px));
            animation: spin 40s linear infinite;
        }
        .dial-ring.running { animation-duration: 6s; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .dial-core {
            position: absolute; inset: 16px; border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(67,217,255,0.06), transparent 60%), rgba(6,9,16,0.6);
            border: 1px solid var(--line);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
            transition: box-shadow 0.2s ease;
        }
        .dial-core.ambient { animation: pulseAmbient 1.2s ease-in-out infinite; }
        @keyframes pulseAmbient { 0%,100% { box-shadow: 0 0 16px rgba(67,217,255,0.12); } 50% { box-shadow: 0 0 30px rgba(67,217,255,0.32); } }
        .dial-core.near { animation: pulseNear 0.8s ease-in-out infinite; }
        @keyframes pulseNear { 0%,100% { box-shadow: 0 0 18px rgba(255,176,32,0.15); } 50% { box-shadow: 0 0 36px rgba(255,176,32,0.5); } }
        .dial-core.hot { animation: pulseHot 0.35s ease-in-out infinite; }
        @keyframes pulseHot { 0%,100% { box-shadow: 0 0 22px rgba(255,61,129,0.3); } 50% { box-shadow: 0 0 46px rgba(255,61,129,0.75); } }

        .display { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; display: flex; justify-content: center; align-items: baseline; gap: 8px; direction: ltr; }
        .unit { display: flex; flex-direction: column; align-items: center; }
        .unit-label { font-family: 'Inter', sans-serif; font-size: 0.58rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }
        .sec-color { color: var(--cyan); }
        .mom-color { color: var(--magenta); }
        .hidden-num { color: #64748b; animation: pulseHidden 1.4s infinite; }
        @keyframes pulseHidden { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
        .separator { color: #4b5568; font-size: 1.8rem; }

        /* ---------- Controls ---------- */
        .controls { display: flex; gap: 10px; margin-top: 14px; }
        .btn { padding: 13px; flex: 1; border: none; border-radius: 16px; font-weight: 700; font-family: 'Sora', sans-serif; font-size: 0.92rem; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; letter-spacing: 0.2px; }
        .btn:active { transform: scale(0.96); }
        .btn-start { background: linear-gradient(135deg, var(--cyan), #0284c7); color: #06121c; box-shadow: 0 6px 16px rgba(67,217,255,0.3); }
        .btn-stop { background: linear-gradient(135deg, #f43f5e, #be123c); color: white; box-shadow: 0 6px 16px rgba(244,63,94,0.3); }
        .btn-next { background: #232c40; color: var(--ink); }
        .btn-submit { background: linear-gradient(135deg, var(--amber), #ff8c00); color: #201200; box-shadow: 0 6px 16px rgba(255,176,32,0.3); }

        .extra-controls { display: flex; gap: 10px; margin-top: 14px; justify-content: center; flex-wrap: wrap; }
        .extra-controls button {
            background: rgba(255,255,255,0.03); color: var(--muted);
            font-size: 0.76rem; padding: 9px 14px; border: 1px solid var(--line);
            border-radius: 10px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s ease;
        }
        .extra-controls button:hover { background: rgba(255,255,255,0.07); color: var(--ink); }

        .back-btn { background: transparent; color: #56607a; font-size: 0.8rem; border: none; margin-top: 16px; cursor: pointer; text-decoration: underline; font-family: 'Inter', sans-serif; }

        /* ---------- Guess panel ---------- */
        .guess-box { display: none; flex-direction: column; gap: 10px; margin-top: 12px; background: rgba(0,0,0,0.35); padding: 16px; border-radius: 18px; border: 1px solid rgba(67,217,255,0.35); }
        .guess-inputs { display: flex; gap: 10px; justify-content: center; align-items: center; direction: ltr; }
        .guess-inputs input { width: 72px; padding: 10px; border-radius: 10px; border: 1px solid #384258; background: #0c1220; color: #fff; font-family: 'Orbitron'; font-size: 1.15rem; text-align: center; outline: none; }
        .guess-inputs input:focus { border-color: var(--amber); }
        .guess-inputs input::placeholder { color: #4b5568; font-family: 'Inter'; font-size: 0.7rem; }

        /* ---------- Celebration ---------- */
        .celebration-overlay { position: fixed; inset: 0; background: rgba(6,9,16,0.95); display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; padding: 20px; }
        .celebration-overlay.active { opacity: 1; pointer-events: all; }
        .celebration-box { background: linear-gradient(135deg, rgba(67,217,255,0.08), rgba(255,61,129,0.08)); border: 1px solid rgba(67,217,255,0.4); padding: 38px 32px; border-radius: 26px; text-align: center; transform: scale(0.5); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 60px rgba(67,217,255,0.25); max-width: 360px; }
        .celebration-overlay.active .celebration-box { transform: scale(1); }
        .celebration-box.champion { border-color: rgba(255,176,32,0.6); box-shadow: 0 0 90px rgba(255,176,32,0.4); background: linear-gradient(135deg, rgba(255,176,32,0.1), rgba(255,61,129,0.08)); }
        .trophy-icon { font-size: 3.2rem; display: none; margin-bottom: 8px; }
        .trophy-icon.show { display: block; animation: trophyFloat 2s ease-in-out infinite; }
        @keyframes trophyFloat { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-10px) rotate(4deg); } }
        .winner-title { font-family: 'Sora', sans-serif; font-size: 1.7rem; font-weight: 800; color: var(--ink); margin-bottom: 8px; line-height: 1.3; }
        .winner-title .glow { color: var(--amber); text-shadow: 0 0 20px rgba(255,176,32,0.6); }
        .winner-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 22px; line-height: 1.4; }
        .play-again-btn { background: linear-gradient(135deg, var(--amber), #ff8c00); color: #1c1000; padding: 14px 28px; font-size: 1.02rem; border: none; border-radius: 16px; cursor: pointer; font-weight: 700; box-shadow: 0 0 24px rgba(255,176,32,0.35); font-family: 'Sora'; width: 100%; }

        .confetti { position: fixed; width: 9px; height: 9px; top: -10px; z-index: 999; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }

        /* ---------- Bracket overlay ---------- */
        .bracket-overlay { position: fixed; inset: 0; background: rgba(6,9,16,0.92); z-index: 900; display: none; flex-direction: column; align-items: center; padding: 40px 16px; overflow-y: auto; }
        .bracket-overlay.active { display: flex; }
        .bracket-title { font-family: 'Sora'; font-weight: 800; font-size: 1.3rem; margin-bottom: 4px; }
        .bracket-sub { color: var(--muted); font-size: 0.8rem; margin-bottom: 20px; }
        .bracket-round { width: 100%; max-width: 340px; margin-bottom: 18px; }
        .bracket-round-title { font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--cyan); font-weight: 700; margin-bottom: 8px; }
        .bracket-match { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; font-size: 0.85rem; }
        .bracket-match .bm-name.won { color: var(--amber); font-weight: 700; }
        .bracket-match .bm-name.tbd { color: #4b5568; font-style: italic; }
        .bracket-match .vs { color: #4b5568; font-size: 0.7rem; margin: 0 8px; }
        .bracket-close { margin-top: 6px; background: rgba(255,255,255,0.06); border: 1px solid var(--line); color: var(--ink); padding: 12px 24px; border-radius: 14px; cursor: pointer; font-family: 'Sora'; font-weight: 700; }

        /* ---------- Inline bracket preview (Step 3) ---------- */
        .bracket-inline { text-align: left; max-height: 44vh; overflow-y: auto; margin-bottom: 18px; padding-right: 4px; }

        /* ---------- History ---------- */
        .history-list { display: flex; flex-direction: column; gap: 10px; max-height: 50vh; overflow-y: auto; margin: 16px 0 20px; }
        .history-row { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; text-align: left; }
        .history-trophy { font-size: 1.4rem; flex-shrink: 0; }
        .history-name { font-family: 'Sora'; font-weight: 700; font-size: 0.92rem; }
        .history-meta { font-size: 0.72rem; color: var(--muted); margin-to
