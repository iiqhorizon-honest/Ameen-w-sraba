<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay focused</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#090d16">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3240/3240638.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@700&family=Tajawal:wght@500;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #090d16;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .game-container {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.05);
            padding: 25px 30px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            width: 380px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .epic-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            background: linear-gradient(45deg, #ffd700, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Screens */
        .screen { display: none; flex-direction: column; width: 100%; }
        .screen.active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Main Menu Buttons */
        .menu-btn {
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            color: #090d16; padding: 15px; margin: 10px 0; border: none;
            border-radius: 20px; font-size: 1.2rem; font-weight: 700; font-family: 'Tajawal', sans-serif;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
        }
        .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(56, 189, 248, 0.6); }
        .menu-btn.alt { background: linear-gradient(135deg, #ff007f, #be123c); color: white; box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4); }
        .menu-btn.alt:hover { box-shadow: 0 8px 20px rgba(255, 0, 127, 0.6); }

        /* Scoreboard */
        .scoreboard { display: flex; justify-content: space-between; margin-bottom: 15px; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 10px; }
        .player { flex: 1; padding: 10px; border-radius: 15px; transition: all 0.3s ease; opacity: 0.5; }
        .player.active { opacity: 1; background: rgba(56, 189, 248, 0.2); border: 1px solid rgba(56, 189, 248, 0.5); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .player.active.alt { background: rgba(255, 0, 127, 0.2); border-color: rgba(255, 0, 127, 0.5); box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); }
        .player-name { font-size: 1rem; font-weight: 700; color: #cbd5e1; margin-bottom: 5px; }
        .player-score { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        /* Shared Game Info */
        .target-box { font-size: 1.1rem; color: #94a3b8; }
        .target-number { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; color: #ff007f; font-weight: 700; margin: 0 5px; text-shadow: 0 0 10px rgba(255, 0, 127, 0.4); letter-spacing: 2px; }
        .status-msg { font-size: 0.95rem; color: #38bdf8; margin-top: 5px; height: 40px; font-weight: 600; display: flex; align-items: center; justify-content: center; text-align: center;}

        /* Display */
        .display { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; margin: 15px 0; display: flex; justify-content: center; align-items: center; gap: 15px; direction: ltr; }
        .unit { display: flex; flex-direction: column; align-items: center; width: 80px;}
        .unit-label { font-family: 'Poppins', sans-serif; font-size: 0.65rem; color: #64748b; text-transform: uppercase; margin-top: 5px; }
        .sec-color { color: #38bdf8; }
        .mom-color { color: #ff007f; }
        .hidden-num { color: #94a3b8; animation: pulseHidden 1.5s infinite; }
        @keyframes pulseHidden { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .separator { color: #cbd5e1; padding-bottom: 15px; }

        /* Controls */
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 12px; flex: 1; border: none; border-radius: 20px; font-weight: 700; font-family: 'Tajawal', sans-serif; font-size: 1rem; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-start { background: linear-gradient(135deg, #38bdf8, #0284c7); color: #090d16; box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }
        .btn-stop { background: linear-gradient(135deg, #f43f5e, #be123c); color: white; box-shadow: 0 5px 15px rgba(244, 63, 94, 0.4); }
        .btn-next { background: #334155; color: white; }
        
        .extra-controls { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .extra-controls button {
            background: rgba(255,255,255,0.05); color: #cbd5e1;
            font-size: 0.85rem; padding: 10px 20px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; cursor: pointer; font-family: 'Tajawal', sans-serif;
        }
        .extra-controls button:hover { background: rgba(255,255,255,0.1); color: white; }

        .back-btn { background: transparent; color: #64748b; font-size: 0.85rem; border: none; margin-top: 15px; cursor: pointer; text-decoration: underline; font-family: 'Tajawal', sans-serif;}

        /* Guess Inputs */
        .guess-box { display: none; flex-direction: column; gap: 10px; margin-top: 10px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; border: 1px solid #38bdf8;}
        .guess-inputs { display: flex; gap: 10px; justify-content: center; align-items: center; direction: ltr;}
        .guess-inputs input { width: 70px; padding: 10px; border-radius: 10px; border: 1px solid #64748b; background: #0f172a; color: #fff; font-family: 'Orbitron'; font-size: 1.2rem; text-align: center; outline: none;}
        .guess-inputs input:focus { border-color: #ffd700; }
        .btn-submit { background: #ffd700; color: #090d16; margin-top: 5px; }

        /* Celebration */
        .celebration-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(9, 13, 22, 0.95); display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
        .celebration-overlay.active { opacity: 1; pointer-events: all; }
        .celebration-box { background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(255, 0, 127, 0.1)); border: 2px solid #38bdf8; padding: 40px; border-radius: 30px; text-align: center; transform: scale(0.5); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 50px rgba(56, 189, 248, 0.4); }
        .celebration-overlay.active .celebration-box { transform: scale(1); }
        .winner-title { font-family: 'Tajawal', sans-serif; font-size: 2.5rem; background: linear-gradient(45deg, #ffd700, #ff007f, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; font-weight: 700; text-shadow: 0 0 20px rgba(255,0,127,0.5); }
        .play-again-btn { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #090d16; padding: 15px 30px; font-size: 1.2rem; margin-top: 15px; border:none; border-radius:20px; cursor:pointer; font-weight:bold; box-shadow: 0 0 20px rgba(255,215,0,0.4); font-family: 'Tajawal';}

        .confetti { position: fixed; width: 10px; height: 10px; top: -10px; z-index: 999; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div class="game-container">
        <h1 class="epic-title">Stay focused</h1>

        <div id="screen-menu" class="screen active">
            <p style="color: #94a3b8; margin-bottom: 25px; font-size: 1.1rem;">اختار التحدي يا بطل</p>
            <button class="menu-btn" onclick="openGame1()">تحدي الهدف 🎯</button>
            <button class="menu-btn alt" onclick="openGame2()">التوقع الأعمى 🎧</button>
        </div>

        <div id="screen-game1" class="screen">
            <div class="scoreboard">
                <div class="player active" id="g1-p-amin"><div class="player-name">أمين</div><div class="player-score" id="g1-s-amin">0</div></div>
                <div class="player" id="g1-p-saraba"><div class="player-name">صرابا</div><div class="player-score" id="g1-s-saraba">0</div></div>
            </div>
            <div class="game-info">
                <div class="target-box">الهدف: وقّف عند <br> <span class="target-number" id="g1-target">00:00</span></div>
                <div class="status-msg" id="g1-status">دور أمين، اضغط ابدأ!</div>
            </div>
            <div class="display">
                <div class="unit"><span class="sec-color" id="g1-sec">00</span><span class="unit-label">Secs</span></div>
                <span class="separator">:</span>
                <div class="unit"><span class="mom-color" id="g1-mom">00</span><span class="unit-label">Mmnts</span></div>
            </div>
            <div class="controls">
                <button class="btn btn-start" id="g1-btn-start" onclick="g1_start()">ابدأ</button>
                <button class="btn btn-stop" id="g1-btn-stop" style="display:none;" onclick="g1_stop()">وقّف</button>
                <button class="btn btn-next" id="g1-btn-next" style="display:none;" onclick="g1_next()">جولة جديدة</button>
            </div>
            <div class="extra-controls">
                <button onclick="g1_manualChangeTarget()">تغيير الهدف 🎯</button>
                <button onclick="g1_manualResetScores()">تصفير النتائج 🔄</button>
            </div>
            <button class="back-btn" onclick="backToMenu()">الرجوع للقائمة الرئيسية</button>
        </div>

        <div id="screen-game2" class="screen">
            <div class="scoreboard">
                <div class="player active alt" id="g2-p-amin"><div class="player-name">أمين</div><div class="player-score" id="g2-s-amin">0</div></div>
                <div class="player alt" id="g2-p-saraba"><div class="player-name">صرابا</div><div class="player-score" id="g2-s-saraba">0</div></div>
            </div>
            <div class="game-info">
                <div class="status-msg" id="g2-status" style="color: #ff007f;">أمين هيتوقع!<br>يا صرابا شغل ووقّف العداد براحتك</div>
            </div>
            <div class="display">
                <div class="unit"><span class="sec-color" id="g2-sec">00</span><span class="unit-label">Secs</span></div>
                <span class="separator">:</span>
                <div class="unit"><span class="mom-color" id="g2-mom">00</span><span class="unit-label">Mmnts</span></div>
            </div>
            
            <div class="guess-box" id="g2-guess-box">
                <div style="color:#ffd700; font-size:0.9rem; margin-bottom:5px;" id="g2-guess-title">يا أمين، تتوقع العداد وقف عند كام؟</div>
                <div class="guess-inputs">
                    <input type="number" id="g2-in-sec" placeholder="ثواني" min="0" max="99">
                    <span style="font-family:'Orbitron'; font-size:1.5rem; color:#fff;">:</span>
                    <input type="number" id="g2-in-mom" placeholder="لحظات" min="0" max="99">
                </div>
                <button class="btn btn-submit" onclick="g2_submitGuess()">تأكيد التوقع ✔️</button>
            </div>

            <div class="controls" id="g2-controls">
                <button class="btn btn-start" id="g2-btn-start" onclick="g2_start()">ابدأ (صوت)</button>
                <button class="btn btn-stop" id="g2-btn-stop" style="display:none;" onclick="g2_stop()">وقّف (صوت)</button>
                <button class="btn btn-next" id="g2-btn-next" style="display:none;" onclick="g2_next()">جولة جديدة</button>
            </div>
            
            <div class="extra-controls">
                <button onclick="g2_manualResetScores()">تصفير النتائج 🔄</button>
            </div>

            <button class="back-btn" onclick="backToMenu()">الرجوع للقائمة الرئيسية</button>
        </div>

    </div>

    <div class="celebration-overlay" id="celebration-overlay">
        <div class="celebration-box">
            <div class="winner-title" id="winner-name">🎉 فوز أمين! 🎉</div>
            <p style="color: #cbd5e1; font-size: 1.1rem; margin-bottom: 20px;">أول من وصل لـ 3 نقاط</p>
            <button class="play-again-btn" onclick="fullReset()">العب ماتش جديد 🎮</button>
        </div>
    </div>

    <script>
        // --- Shared Logic ---
        let audioCtx;
        function playSound(freq1, freq2, type = 'sine', duration = 0.15) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type; osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq1, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq2, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function backToMenu() { showScreen('screen-menu'); }

        function throwConfetti() {
            const colors = ['#38bdf8', '#ff007f', '#ffd700', '#10b981'];
            for (let i = 0; i < 80; i++) {
                let conf = document.createElement('div'); conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                conf.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 5000);
            }
        }

        function triggerWin(winnerName) {
            playSound(600, 2000, 'triangle', 0.5);
            document.getElementById('winner-name').textContent = `🎉 فوز ${winnerName}! 🎉`;
            document.getElementById('celebration-overlay').classList.add('active');
            throwConfetti();
        }

        let activeGame = 0; // 1 or 2
        function fullReset() {
            document.getElementById('celebration-overlay').classList.remove('active');
            if(activeGame === 1) { g1_scoreAmin = 0; g1_scoreSaraba = 0; g1_hardReset(); }
            else if(activeGame === 2) { g2_scoreAmin = 0; g2_scoreSaraba = 0; g2_hardReset(); }
        }

        // --- Game 1: Target Match Logic ---
        let g1_startTime = 0, g1_elapsed = 0, g1_timer;
        let g1_targetTotal = 0, g1_turn = 'amin', g1_diffAmin = 0, g1_diffSaraba = 0;
        let g1_scoreAmin = 0, g1_scoreSaraba = 0, g1_isRunning = false;

        function openGame1() { activeGame = 1; showScreen('screen-game1'); g1_hardReset(); }

        function g1_genTarget() {
            const sec = Math.floor(Math.random() * 5) + 2; const mom = Math.floor(Math.random() * 100);
            g1_targetTotal = (sec * 100) + mom;
            document.getElementById('g1-target').textContent = sec.toString().padStart(2, '0') + ":" + mom.toString().padStart(2, '0');
        }

        function g1_manualChangeTarget() {
            if (g1_isRunning) return; 
            g1_genTarget();
            playSound(800, 1200, 'sine');
            document.getElementById('g1-status').textContent = "تم تغيير الهدف!";
        }

        function g1_manualResetScores() {
            if (g1_isRunning) return;
            g1_scoreAmin = 0; g1_scoreSaraba = 0; 
            document.getElementById('g1-s-amin').textContent = "0"; 
            document.getElementById('g1-s-saraba').textContent = "0";
            g1_next();
            document.getElementById('g1-status').textContent = "تم تصفير الماتش. دور أمين!";
        }

        function g1_start() {
            playSound(1200, 300); g1_isRunning = true; g1_startTime = Date.now() - g1_elapsed;
            g1_timer = setInterval(g1_update, 10);
            document.getElementById('g1-btn-start').style.display = "none"; document.getElementById('g1-btn-stop').style.display = "block";
            document.getElementById('g1-status').textContent = "ركّز ووقّف في اللحظة المناسبة!";
        }

        function g1_update() {
            const time = Date.now() - g1_startTime;
            document.getElementById('g1-sec').textContent = Math.floor(time / 1000).toString().padStart(2, '0');
            document.getElementById('g1-mom').textContent = Math.floor((time % 1000) / 10).toString().padStart(2, '0');
        }

        function g1_stop() {
            playSound(1200, 300); clearInterval(g1_timer); g1_isRunning = false;
            g1_elapsed = Date.now() - g1_startTime;
            const diff = Math.abs(Math.floor(g1_elapsed / 10) - g1_targetTotal);

            if (g1_turn === 'amin') {
                g1_diffAmin = diff; document.getElementById('g1-status').textContent = `أمين بفرق ${diff}! دور صرابا..`;
                g1_turn = 'saraba'; document.getElementById('g1-p-amin').classList.remove('active'); document.getElementById('g1-p-saraba').classList.add('active');
                document.getElementById('g1-btn-start').textContent = "ابدأ (صرابا)"; document.getElementById('g1-btn-start').style.display = "block";
                document.getElementById('g1-btn-stop').style.display = "none";
                document.getElementById('g1-sec').textContent = "00"; document.getElementById('g1-mom').textContent = "00"; g1_elapsed = 0;
            } else {
                g1_diffSaraba = diff; let res = "", matchWin = null;
                if (g1_diffAmin < g1_diffSaraba) { res = `فوز أمين! (فرق: ${g1_diffAmin})`; g1_scoreAmin++; document.getElementById('g1-s-amin').textContent = g1_scoreAmin; playSound(800, 1500, 'triangle'); if(g1_scoreAmin >= 3) matchWin = "أمين"; }
                else if (g1_diffSaraba < g1_diffAmin) { res = `فوز صرابا! (فرق: ${g1_diffSaraba})`; g1_scoreSaraba++; document.getElementById('g1-s-saraba').textContent = g1_scoreSaraba; playSound(800, 1500, 'triangle'); if(g1_scoreSaraba >= 3) matchWin = "صرابا"; }
                else { res = `تعادل! (الفرق: ${g1_diffAmin})`; }

                if (matchWin) { setTimeout(() => triggerWin(matchWin), 500); }
                else {
                    document.getElementById('g1-status').textContent = res;
                    document.getElementById('g1-btn-start').style.display = "none"; document.getElementById('g1-btn-stop').style.display = "none";
                    document.getElementById('g1-btn-next').style.display = "block";
                }
            }
        }

        function g1_next() {
            playSound(600, 100, 'triangle'); g1_genTarget(); g1_turn = 'amin';
            document.getElementById('g1-p-saraba').classList.remove('active'); document.getElementById('g1-p-amin').classList.add('active');
            document.getElementById('g1-status').textContent = "دور أمين، اضغط ابدأ!";
            document.getElementById('g1-sec').textContent = "00"; document.getElementById('g1-mom').textContent = "00"; g1_elapsed = 0;
            document.getElementById('g1-btn-next').style.display = "none"; document.getElementById('g1-btn-start').textContent = "ابدأ (أمين)"; document.getElementById('g1-btn-start').style.display = "block";
        }

        function g1_hardReset() {
            document.getElementById('g1-s-amin').textContent = g1_scoreAmin; document.getElementById('g1-s-saraba').textContent = g1_scoreSaraba;
            g1_next();
        }

        // --- Game 2: Blind Guess Logic ---
        let g2_startTime = 0, g2_elapsed = 0, g2_timer;
        let g2_actualTotal = 0, g2_turn = 'amin', g2_diffAmin = 0, g2_diffSaraba = 0;
        let g2_scoreAmin = 0, g2_scoreSaraba = 0;
        let g2_isRunning = false;

        function openGame2() { activeGame = 2; showScreen('screen-game2'); g2_hardReset(); }

        function g2_manualResetScores() {
            if (g2_isRunning) return; // منع التصفير أثناء عمل العداد
            g2_scoreAmin = 0; g2_scoreSaraba = 0; 
            document.getElementById('g2-s-amin').textContent = "0"; 
            document.getElementById('g2-s-saraba').textContent = "0";
            g2_next();
            document.getElementById('g2-status').innerHTML = "تم تصفير الماتش.<br>أمين هيتوقع!";
        }

        function g2_start() {
            playSound(1200, 300); g2_isRunning = true; g2_startTime = Date.now() - g2_elapsed; g2_timer = setInterval(g2_update, 10);
            document.getElementById('g2-btn-start').style.display = "none"; document.getElementById('g2-btn-stop').style.display = "block";
            // Hide numbers
            document.getElementById('g2-sec').textContent = "??"; document.getElementById('g2-sec').classList.add('hidden-num');
            document.getElementById('g2-mom').textContent = "??"; document.getElementById('g2-mom').classList.add('hidden-num');
            document.getElementById('g2-status').innerHTML = "العداد شغال في السر 🤫<br>وقّف براحتك يا وحش";
        }

        function g2_update() { /* No UI update during running to prevent cheating */ }

        function g2_stop() {
            playSound(600, 100); clearInterval(g2_timer); g2_isRunning = false; g2_elapsed = Date.now() - g2_startTime;
            g2_actualTotal = Math.floor(g2_elapsed / 10);
            document.getElementById('g2-btn-stop').style.display = "none";
            
            // Show Guess Form
            document.getElementById('g2-guess-box').style.display = "flex";
            if(g2_turn === 'amin') document.getElementById('g2-guess-title').textContent = "يا أمين، تتوقع العداد وقف عند كام؟";
            else document.getElementById('g2-guess-title').textContent = "يا صرابا، تتوقع العداد وقف عند كام؟";
            document.getElementById('g2-status').innerHTML = "مستنيين التوقع...";
        }

        function g2_submitGuess() {
            let sec = parseInt(document.getElementById('g2-in-sec').value) || 0;
            let mom = parseInt(document.getElementById('g2-in-mom').value) || 0;
            let guessTotal = (sec * 100) + mom;
            let diff = Math.abs(g2_actualTotal - guessTotal);

            // Reveal actual time
            document.getElementById('g2-sec').classList.remove('hidden-num'); document.getElementById('g2-mom').classList.remove('hidden-num');
            document.getElementById('g2-sec').textContent = Math.floor(g2_elapsed / 1000).toString().padStart(2, '0');
            document.getElementById('g2-mom').textContent = Math.floor((g2_elapsed % 1000) / 10).toString().padStart(2, '0');
            document.getElementById('g2-guess-box').style.display = "none";
            document.getElementById('g2-in-sec').value = ''; document.getElementById('g2-in-mom').value = ''; // clear inputs

            if (g2_turn === 'amin') {
                g2_diffAmin = diff; document.getElementById('g2-status').innerHTML = `الرقم الحقيقي ظهر! أمين جاب فرق ${diff} لحظة.<br>دور صرابا يتوقع!`;
                g2_turn = 'saraba'; document.getElementById('g2-p-amin').classList.remove('active'); document.getElementById('g2-p-saraba').classList.add('active');
                document.getElementById('g2-btn-start').style.display = "block";
                g2_elapsed = 0; // ready for next run

            } else {
                g2_diffSaraba = diff; let res = "", matchWin = null;
                if (g2_diffAmin < g2_diffSaraba) { res = `فوز أمين بالتوقع! (أمين فرق ${g2_diffAmin}، صرابا فرق ${g2_diffSaraba})`; g2_scoreAmin++; document.getElementById('g2-s-amin').textContent = g2_scoreAmin; playSound(800, 1500, 'triangle'); if(g2_scoreAmin >= 3) matchWin = "أمين"; }
                else if (g2_diffSaraba < g2_diffAmin) { res = `فوز صرابا بالتوقع! (أمين فرق ${g2_diffAmin}، صرابا فرق ${g2_diffSaraba})`; g2_scoreSaraba++; document.getElementById('g2-s-saraba').textContent = g2_scoreSaraba; playSound(800, 1500, 'triangle'); if(g2_scoreSaraba >= 3) matchWin = "صرابا"; }
                else { res = `تعادل أسطوري! كلاكما بفرق ${g2_diffAmin}`; }

                if (matchWin) { setTimeout(() => triggerWin(matchWin), 2000); } // delay slightly so they see the result
                else {
                    document.getElementById('g2-status').innerHTML = res;
                    document.getElementById('g2-btn-next').style.display = "block";
                }
            }
        }

        function g2_next() {
            playSound(600, 100, 'triangle'); g2_turn = 'amin';
            document.getElementById('g2-p-saraba').classList.remove('active'); document.getElementById('g2-p-amin').classList.add('active');
            document.getElementById('g2-status').innerHTML = "أمين هيتوقع!<br>يا صرابا شغل ووقّف العداد براحتك";
            document.getElementById('g2-sec').textContent = "00"; document.getElementById('g2-mom').textContent = "00"; g2_elapsed = 0;
            document.getElementById('g2-btn-next').style.display = "none"; document.getElementById('g2-btn-start').style.display = "block";
            // clear hidden class just in case
            document.getElementById('g2-sec').classList.remove('hidden-num'); document.getElementById('g2-mom').classList.remove('hidden-num');
        }

        function g2_hardReset() {
            document.getElementById('g2-s-amin').textContent = g2_scoreAmin; document.getElementById('g2-s-saraba').textContent = g2_scoreSaraba;
            g2_next();
        }

        // PWA Setup
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
        }
    </script>
</body>
</html>
